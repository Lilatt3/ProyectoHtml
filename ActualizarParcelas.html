{% extends "base.html" %}
{% block title %}Actualizar Parcela{% endblock %}

{% block content %}
<h1>Actualizar Parcela</h1>

<form action="{{ url_for('actualizar_parcela', id_parcela=par.id_parcela) }}" method="POST">
    <label for="cultivo">Cultivo:</label><br>
    <input type="text" id="cultivo" name="cultivo" value="{{ par.cultivo }}" required><br>

    <label for="superficie">Superficie:</label><br>
    <input type="number" id="superficie" name="superficie" value="{{ par.superficie }}" required><br>

    <label for="ubicacion">Ubicación:</label><br>
    <input type="text" id="ubicacion" name="ubicacion" value="{{ par.ubicacion }}" required><br>

    <label for="tipo">Tipo:</label><br>
    <input type="text" id="tipo" name="tipo" value="{{ par.tipo }}" required><br>

    <button type="submit">Actualizar</button>
</form>

<br>
<a href="{{ url_for('home') }}">Volver atrás</a>
{% endblock %}
